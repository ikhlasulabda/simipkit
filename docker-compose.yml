version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simipkit-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-simipkit}
      - DB_USER=${DB_USER:-simipkit_app}
      - DB_PASSWORD=${DB_PASSWORD:-simipkit_pass}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.5
    container_name: simipkit-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pass}
      - MYSQL_DATABASE=${DB_NAME:-simipkit}
      - MYSQL_USER=${DB_USER:-simipkit_app}
      - MYSQL_PASSWORD=${DB_PASSWORD:-simipkit_pass}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
